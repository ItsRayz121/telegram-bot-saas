<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563EB" />

    <!-- Primary SEO -->
    <meta name="description" content="Telegizer — Telegram group management platform. AutoMod, scheduled messages, member XP system, analytics, and AI auto-reply. Free plan available." />
    <meta name="keywords" content="telegram bot, telegram group management, automod, scheduled messages, telegram automation, community management" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon — sized assets -->
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="shortcut icon" type="image/png" href="/icons/favicon-32.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple / iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Telegizer" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- MS Tiles -->
    <meta name="msapplication-TileColor" content="#2563EB" />
    <meta name="msapplication-TileImage" content="/icons/telegizer-icon-192.png" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://telegizer.com/" />
    <meta property="og:title" content="Telegizer — Telegram Community Management Platform" />
    <meta property="og:description" content="AutoMod, scheduled posts, member XP system, analytics, and AI auto-reply for Telegram groups. Free plan, no credit card required." />
    <meta property="og:image" content="https://telegizer.com/og-image.png" />
    <meta property="og:site_name" content="Telegizer" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://telegizer.com/" />
    <meta name="twitter:title" content="Telegizer — Telegram Community Management Platform" />
    <meta name="twitter:description" content="AutoMod, scheduled posts, member XP system, analytics, and AI auto-reply for Telegram groups. Free plan, no credit card required." />
    <meta name="twitter:image" content="https://telegizer.com/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://telegizer.com/" />

    <title>Telegizer — Telegram Community Management Platform</title>

    <!-- Schema.org structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Telegizer",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://telegizer.com",
      "description": "Automate your Telegram groups with AutoMod, scheduled posts, XP member system, analytics, and AI knowledge base.",
      "offers": [
        {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "name": "Free Plan"
        },
        {
          "@type": "Offer",
          "price": "9",
          "priceCurrency": "USD",
          "name": "Pro Plan",
          "billingIncrement": "P1M"
        },
        {
          "@type": "Offer",
          "price": "49",
          "priceCurrency": "USD",
          "name": "Enterprise Plan",
          "billingIncrement": "P1M"
        }
      ],
      "provider": {
        "@type": "Organization",
        "name": "Telegizer",
        "url": "https://telegizer.com",
        "contactPoint": {
          "@type": "ContactPoint",
          "email": "support@telegizer.com",
          "contactType": "customer support"
        }
      }
    }
    </script>

    <!-- FAQ structured data — mirrors the landing-page FAQ for rich results -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is it safe to add the Telegizer bot as admin?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Telegizer only requests the Telegram permissions it needs: delete messages, ban/restrict users, pin messages, and invite links. We never read private messages or access group data outside the scope of bot commands."
          }
        },
        {
          "@type": "Question",
          "name": "What payment methods does Telegizer support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Payments are processed via NOWPayments and support USDT, BTC, ETH, BNB, TRX, SOL, and 300+ other coins. Plans are one-time payments per billing period and never auto-renew."
          }
        },
        {
          "@type": "Question",
          "name": "What is included in Free vs Pro vs Enterprise?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Free: 1 custom bot (3 groups per bot), basic moderation, welcome messages, XP system, plus unlimited groups on the shared @telegizer_bot. Pro ($9/mo): 3 custom bots, unlimited groups, advanced AutoMod, scheduled messages, analytics, AI knowledge base. Enterprise ($49/mo): 50 custom bots, all Pro features plus API access, dedicated support, SLA. Every new account starts with a free 14-day Pro trial."
          }
        },
        {
          "@type": "Question",
          "name": "Are bot tokens stored securely?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Bot tokens are encrypted at rest using AES-256 (Fernet) before being written to the database. Tokens are never stored in plain text and never appear in API responses."
          }
        },
        {
          "@type": "Question",
          "name": "What happens if I cancel or my plan expires?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Plans never auto-renew. If you cancel, any paid time stays active until its expiry date. After expiry, paid features become read-only and free plan features stay active indefinitely. You can renew at any time and everything comes back immediately."
          }
        }
      ]
    }
    </script>

    <!-- Privacy-first analytics (no cookies, GDPR compliant) -->
    <script defer data-domain="telegizer.com" src="https://plausible.io/js/script.js"></script>

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9WBC9137VQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9WBC9137VQ');
    </script>
    <!-- Telegram Mini App detection + SDK loader.
         Self-hosted synchronous script (NOT inline) so the production CSP
         (script-src 'self') allows it — see public/tg-boot.js for details. -->
    <script src="/tg-boot.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* Prevent horizontal overflow globally */
      html, body { overflow-x: hidden; }
      /* Smooth scrolling */
      html { scroll-behavior: smooth; }
      /* Safe area for notched phones */
      body { padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
