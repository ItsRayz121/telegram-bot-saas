<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />

    <!-- Primary SEO -->
    <meta name="description" content="Telegizer — Automate your Telegram groups with AutoMod spam protection, scheduled posts, XP member system, analytics, and AI knowledge base. Free plan, no credit card needed." />
    <meta name="keywords" content="telegram bot, telegram group management, automod, scheduled messages, telegram saas, community bot" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icons/telegizer-icon.png" />
    <link rel="shortcut icon" type="image/png" href="/icons/telegizer-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple / iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Telegizer" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />

    <!-- MS Tiles -->
    <meta name="msapplication-TileColor" content="#1a1a2e" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://telegizer.xyz/" />
    <meta property="og:title" content="Telegizer — Telegram Group Automation" />
    <meta property="og:description" content="AutoMod, scheduled posts, XP system, growth analytics and AI support — running 24/7 on autopilot. Free forever for 1 bot." />
    <meta property="og:image" content="https://telegizer.xyz/og-image.png" />
    <meta property="og:site_name" content="Telegizer" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://telegizer.xyz/" />
    <meta name="twitter:title" content="Telegizer — Telegram Group Automation" />
    <meta name="twitter:description" content="AutoMod, scheduled posts, XP system, growth analytics and AI support — running 24/7 on autopilot. Free forever for 1 bot." />
    <meta name="twitter:image" content="https://telegizer.xyz/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://telegizer.xyz/" />

    <title>Telegizer — Telegram Group Automation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* Prevent horizontal overflow globally */
      html, body { overflow-x: hidden; }
      /* Smooth scrolling */
      html { scroll-behavior: smooth; }
      /* Safe area for notched phones */
      body { padding-bottom: env(safe-area-inset-bottom); }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
